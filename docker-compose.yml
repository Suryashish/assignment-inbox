# Production-shaped stack — `docker compose up --build` runs the real thing.
# For hot-reload dev, overlay docker-compose.dev.yml (see README).
services:
  redis:
    image: redis:7-alpine
    # AOF persistence -> the board survives restarts.
    command: ['redis-server', '--appendonly', 'yes']
    # Published so local tooling (`pnpm dev`, tests) can reach it at localhost:6379.
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [ctb]

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: runtime
    environment:
      PORT: 4000
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 4s
      retries: 5
    restart: unless-stopped
    networks: [ctb]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
      args:
        # The browser talks to the server via this PUBLIC url (baked at build).
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    environment:
      PORT: 3000
    depends_on:
      - server
    ports:
      - '3000:3000'
    restart: unless-stopped
    networks: [ctb]

networks:
  ctb:

volumes:
  redis-data:
