# Dev overlay: hot reload with source bind-mounts.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# The repo is mounted into /app for live edits, while anonymous volumes keep the
# container-installed node_modules (host has none — avoids shadowing pnpm links).
services:
  server:
    build:
      target: dev
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/server/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
    healthcheck:
      disable: true

  web:
    build:
      target: dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/server/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
      - /app/apps/web/.next
